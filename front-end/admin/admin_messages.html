<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Communication Monitoring | Admin Hub</title>
    <link rel="stylesheet" href="admin_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { overflow: hidden; background-color: #f8fafc; margin: 0; padding: 0; }
        .admin-main-content { width: calc(100% - 260px); margin-left: 260px; height: 100vh; display: flex; flex-direction: column; }
        
        .monitor-container { 
            display: grid; 
            grid-template-columns: 350px 1fr; 
            height: calc(100vh - 160px); 
            background: white; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            overflow: hidden; 
            margin: 0 25px 25px 25px; 
        }

        .thread-sidebar { border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; background: #fff; }
        .thread-search { padding: 15px; border-bottom: 1px solid #f1f5f9; }
        
        .search-wrapper { position: relative; display: flex; align-items: center; }
        .search-wrapper i { position: absolute; left: 12px; color: #94a3b8; }
        .search-wrapper input { width: 100%; padding: 10px 10px 10px 35px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; font-size: 0.9rem; }

        .thread-list { overflow-y: auto; flex: 1; }
        
        .thread-item { 
            padding: 18px; 
            border-bottom: 1px solid #f8fafc; 
            cursor: pointer; 
            transition: 0.2s; 
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .thread-item:hover { background: #f8fafc; }
        .thread-item.active { background: #eff6ff; border-left: 4px solid #3b82f6; }
        
        .thread-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .participants { font-weight: 700; font-size: 0.95rem; color: #1e293b; padding-right: 10px; }
        
        /* Status Badges in Sidebar */
        .badge-row { display: flex; gap: 5px; }
        .dispute-tag { font-size: 0.6rem; color: #64748b; font-weight: 800; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; }
        .flag-tag { font-size: 0.6rem; color: #fff; background: #ef4444; padding: 2px 6px; border-radius: 4px; font-weight: 800; }
        .reviewed-tag { font-size: 0.6rem; color: #fff; background: #10b981; padding: 2px 6px; border-radius: 4px; font-weight: 800; }

        .chat-monitor { display: flex; flex-direction: column; background: #fbfcfe; position: relative; }
        .chat-header { padding: 15px 25px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        
        .msg-bubble { max-width: 75%; padding: 15px; border-radius: 12px; position: relative; font-size: 0.9rem; border: 1px solid transparent; }
        .msg-left { background: white; border: 1px solid #e2e8f0; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-right { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .msg-meta { font-size: 0.7rem; color: #94a3b8; margin-top: 8px; display: flex; gap: 12px; }
        .msg-right .msg-meta { color: #bfdbfe; }
        
        .flag-btn { cursor: pointer; font-weight: 600; }
        .flagged-msg { border: 2px solid #ef4444 !important; background: #fef2f2 !important; color: #1e293b !important; }

        .monitor-footer { background: #fffbeb; border-top: 1px solid #fef3c7; padding: 12px; text-align: center; color: #92400e; font-size: 0.8rem; font-weight: 600; }
    </style>
</head>
<body class="admin-dashboard-layout">
    <div id="admin-sidebar-placeholder"></div>
    <main class="admin-main-content">
        <div id="admin-navbar-placeholder"></div>
        <div class="admin-view-padding">
            <div class="view-header">
                <h1>Messages & Communication Monitoring</h1>
                <p>Track interactions to ensure platform safety and compliance.</p>
            </div>
        </div>

        <div class="monitor-container">
            <div class="thread-sidebar">
                <div class="thread-search">
                    <div class="search-wrapper">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="tSearch" placeholder="Search by name or ID..." oninput="renderThreads()">
                    </div>
                </div>
                <div class="thread-list" id="thread-container"></div>
            </div>

            <div class="chat-monitor">
                <div id="chat-header-area" class="chat-header">
                    <div style="color:#94a3b8">Select a conversation to begin monitoring</div>
                </div>
                
                <div class="chat-body" id="chat-body">
                    <div style="margin: auto; color: #cbd5e1; text-align: center;">
                        <i class="fa-solid fa-comment-dots" style="font-size: 4rem; margin-bottom: 15px; opacity: 0.5;"></i>
                        <p style="font-weight: 600;">Monitoring System Ready</p>
                    </div>
                </div>

                <div class="monitor-footer">
                    <i class="fa-solid fa-lock"></i> ADMIN SECURE VIEW: Direct messaging is locked for this account.
                </div>
            </div>
        </div>
    </main>

    <script src="admin_backend_data.js"></script>
    <script src="admin_sidebar.js"></script>
    <script src="admin_navbar.js"></script>
    <script>
        let activeThreadId = null;

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getThread(id) {
            return (AdminData.conversations || []).find(c => c.id === id);
        }

        function getActionableMessages(chat) {
            return (chat && Array.isArray(chat.messages) ? chat.messages : [])
                .filter((message) => message.id && (message.caseId || chat.caseId));
        }

        function renderThreads() {
            const query = document.getElementById('tSearch').value.toLowerCase();
            const container = document.getElementById('thread-container');
            
            const filtered = (AdminData.conversations || []).filter(c => 
                c.participants.toLowerCase().includes(query) || c.id.toLowerCase().includes(query)
            );

            if (!filtered.length) {
                container.innerHTML = `<div style="padding:20px; color:#94a3b8; font-weight:600;">No backend case conversations found.</div>`;
                return;
            }

            container.innerHTML = filtered.map(c => `
                <div class="thread-item ${activeThreadId === c.id ? 'active' : ''}" onclick="selectThread('${escapeHtml(c.id)}')">
                    <div class="thread-top">
                        <span class="participants">${escapeHtml(c.participants)}</span>
                        <div class="badge-row">
                            ${c.isFlagged ? '<span class="flag-tag">FLAGGED</span>' : ''}
                            ${c.isReviewed ? '<span class="reviewed-tag"><i class="fa-solid fa-check"></i></span>' : ''}
                            <span class="dispute-tag">${escapeHtml(c.id)}</span>
                        </div>
                    </div>
                    <div style="font-size:0.8rem; color:#64748b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                        ${escapeHtml(c.lastMessage)}
                    </div>
                    <div style="font-size:0.7rem; color:#94a3b8; display:flex; justify-content:space-between; margin-top:5px;">
                        <span>${escapeHtml(c.type)}</span>
                        <span>${escapeHtml(c.time)}</span>
                    </div>
                </div>
            `).join('');
        }

        function selectThread(id) {
            activeThreadId = id;
            renderThreads();
            const chat = getThread(id);
            if (!chat) return;
            
            // Toggle Logic for Buttons
            const flagBtnText = chat.isFlagged ? 'Unflag Dispute' : 'Flag Dispute';
            const reviewBtnText = chat.isReviewed ? 'Reviewed' : 'Mark Reviewed';
            const reviewBtnColor = chat.isReviewed ? '#10b981' : '#64748b';

            document.getElementById('chat-header-area').innerHTML = `
                <div>
                    <h3 style="margin:0; font-size:1.1rem; color:#1e293b;">${escapeHtml(chat.participants)}</h3>
                    <span style="font-size:0.8rem; color:#64748b;">Monitoring Ref: ${escapeHtml(chat.id)}</span>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-outline" style="padding:8px 16px; border-color:${chat.isFlagged ? '#ef4444':'#e2e8f0'}; color:${chat.isFlagged ? '#ef4444':'#64748b'}" onclick="toggleThreadFlag('${escapeHtml(id)}')">
                        <i class="fa-solid fa-triangle-exclamation"></i> ${flagBtnText}
                    </button>
                    <button class="btn-primary-sm" style="background:${reviewBtnColor}; border:none;" onclick="markReviewed('${escapeHtml(id)}')">
                        <i class="fa-solid fa-check-double"></i> ${reviewBtnText}
                    </button>
                </div>
            `;

            const body = document.getElementById('chat-body');
            if (!chat.messages.length) {
                body.innerHTML = `
                    <div style="margin:auto; color:#94a3b8; text-align:center;">
                        <i class="fa-solid fa-inbox" style="font-size:3rem; margin-bottom:12px;"></i>
                        <p>No messages have been filed for this case yet.</p>
                    </div>
                `;
                return;
            }

            body.innerHTML = chat.messages.map((m, idx) => `
                <div class="msg-bubble ${idx % 2 === 0 ? 'msg-left' : 'msg-right'} ${m.flagged ? 'flagged-msg' : ''}">
                    <div style="font-weight:800; font-size:0.7rem; margin-bottom:6px; opacity:0.8;">${escapeHtml(m.sender).toUpperCase()}</div>
                    <div>${escapeHtml(m.text)}</div>
                    <div class="msg-meta">
                        <span>${escapeHtml(m.time)}</span>
                        ${m.reviewed ? '<span><i class="fa-solid fa-check"></i> Reviewed</span>' : ''}
                        <span class="flag-btn" onclick="toggleMsgFlag('${escapeHtml(id)}', ${idx})">
                            <i class="fa-solid fa-flag"></i> ${m.flagged ? 'Unflag' : 'Flag'}
                        </span>
                        <span class="flag-btn" style="color:#ef4444" onclick="deleteMsg('${escapeHtml(id)}', ${idx})">
                            <i class="fa-solid fa-trash"></i> Delete
                        </span>
                    </div>
                </div>
            `).join('');
            body.scrollTop = body.scrollHeight;
        }

        async function syncMessagesAndSelect(id) {
            await window.syncAdminBackendData({ silent: true });
            renderThreads();
            selectThread(id);
        }

        async function updateCaseMessage(message, patch) {
            const caseId = message.caseId || activeThreadId;
            return requestAdminApi(`/cases/${encodeURIComponent(caseId)}/messages/${encodeURIComponent(message.id)}`, {
                method: 'PATCH',
                headers: getAdminRequestHeaders(),
                body: patch
            });
        }

        async function toggleThreadFlag(id) {
            const chat = getThread(id);
            const messages = getActionableMessages(chat);
            if (!messages.length) {
                window.showAppToast("No backend messages are available to flag for this case.", "info");
                return;
            }

            const nextFlag = !chat.isFlagged;
            try {
                await Promise.all(messages.map((message) => updateCaseMessage(message, { flagged: nextFlag })));
                logAdminActivity(`${nextFlag ? 'Flagged' : 'Unflagged'} case conversation ${id}`);
                await syncMessagesAndSelect(id);
                window.showAppToast(nextFlag ? "Conversation flagged." : "Conversation unflagged.", "success");
            } catch (error) {
                window.showAppToast(error.message || "Could not update message flags.", "error");
            }
        }

        async function markReviewed(id) {
            const chat = getThread(id);
            const messages = getActionableMessages(chat);
            if (!messages.length) {
                window.showAppToast("No backend messages are available to review for this case.", "info");
                return;
            }

            const nextReviewed = !chat.isReviewed;
            try {
                await Promise.all(messages.map((message) => updateCaseMessage(message, { reviewed: nextReviewed })));
                if (nextReviewed) logAdminActivity(`Case conversation ${id} marked as reviewed`);
                await syncMessagesAndSelect(id);
                window.showAppToast(nextReviewed ? "Conversation marked reviewed." : "Review mark removed.", "success");
            } catch (error) {
                window.showAppToast(error.message || "Could not update review status.", "error");
            }
        }

        async function toggleMsgFlag(chatId, idx) {
            const chat = getThread(chatId);
            const message = chat && chat.messages ? chat.messages[idx] : null;
            if (!message || !message.id) {
                window.showAppToast("This message is not linked to the backend.", "warning");
                return;
            }

            try {
                await updateCaseMessage(message, { flagged: !message.flagged });
                await syncMessagesAndSelect(chatId);
            } catch (error) {
                window.showAppToast(error.message || "Could not update message flag.", "error");
            }
        }

        async function deleteMsg(chatId, idx) {
            const chat = getThread(chatId);
            const message = chat && chat.messages ? chat.messages[idx] : null;
            if (!message || !message.id) {
                window.showAppToast("This message is not linked to the backend.", "warning");
                return;
            }

            const confirmed = await showAppModal("Delete Message", "Permanently remove this message from the shared case record?", {
                confirm: true,
                type: "danger",
                okText: "Delete"
            });
            if (!confirmed) return;

            try {
                const caseId = message.caseId || chatId;
                await requestAdminApi(`/cases/${encodeURIComponent(caseId)}/messages/${encodeURIComponent(message.id)}`, {
                    method: 'DELETE',
                    headers: getAdminRequestHeaders()
                });
                logAdminActivity(`Deleted message ${message.id} from case ${caseId}`);
                await syncMessagesAndSelect(chatId);
                window.showAppToast("Message deleted from the backend.", "success");
            } catch (error) {
                window.showAppToast(error.message || "Could not delete the message.", "error");
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (window.AdminDataReady) await window.AdminDataReady;
            renderThreads();
        });
    </script>
</body>
</html>
