<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearings Management | Admin Hub</title>
    <link rel="stylesheet" href="admin_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Force layout to fit screen and prevent sideways scrolling */
        body, html { overflow-x: hidden; width: 100%; margin: 0; padding: 0; background-color: #f8fafc; }
        
        .admin-main-content { 
            width: calc(100% - 260px); 
            margin-left: 260px;
            box-sizing: border-box; 
            min-height: 100vh;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .stat-info h3 { font-size: 0.85rem; color: #64748b; margin-bottom: 5px; }
        .stat-info p { font-size: 1.8rem; font-weight: 800; color: #1e293b; margin: 0; }
        .stat-icon { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        .hearings-layout { display: grid; grid-template-columns: 1fr 300px; gap: 25px; }
        .filter-section { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 25px; }
        .filter-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr auto; gap: 12px; margin-bottom: 15px; }
        
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; display: inline-block; white-space: nowrap; }
        .status-scheduled { background: #eff6ff; color: #2563eb; }
        .status-live { background: #ecfdf5; color: #10b981; }
        .status-completed { background: #f1f5f9; color: #64748b; }

        .actions-flex { display: flex; gap: 12px; align-items: center; }
        .btn-mini { background: none; border: none; cursor: pointer; color: #64748b; font-size: 1rem; transition: 0.2s; }
        .btn-mini:hover { color: #2563eb; transform: scale(1.1); }
        .btn-mini.btn-delete:hover { color: #ef4444; }

        /* Activity Log Styles */
        .log-container { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; }
        .log-item { padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .log-item:last-child { border: none; }
        .log-text { font-size: 0.85rem; color: #1e293b; display: block; font-weight: 500; margin-bottom: 3px; }
        .log-date { font-size: 0.75rem; color: #94a3b8; }
    </style>
</head>
<body class="admin-dashboard-layout">
    <div id="admin-sidebar-placeholder"></div>
    <main class="admin-main-content">
        <div id="admin-navbar-placeholder"></div>
        <div class="admin-view-padding">
            <div class="view-header">
                <h1>Hearings Management</h1>
                <p>Monitor and manage scheduled arbitration hearings.</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info"><h3>Total Hearings</h3><p id="stat-total">0</p></div>
                    <div class="stat-icon" style="background: #eff6ff; color: #3b82f6;"><i class="fa-solid fa-calendar-check"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-info"><h3>Upcoming</h3><p id="stat-upcoming">0</p></div>
                    <div class="stat-icon" style="background: #fff7ed; color: #f97316;"><i class="fa-solid fa-clock"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-info"><h3>Today</h3><p id="stat-today">0</p></div>
                    <div class="stat-icon" style="background: #ecfdf5; color: #10b981;"><i class="fa-solid fa-calendar-day"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-info"><h3>Completed</h3><p id="stat-completed">0</p></div>
                    <div class="stat-icon" style="background: #f1f5f9; color: #64748b;"><i class="fa-solid fa-check-double"></i></div>
                </div>
            </div>

            <div class="hearings-layout">
                <div class="list-col">
                    <div class="filter-section">
                        <div class="filter-row">
                            <div class="search-bar" style="width: 100%;">
                                <i class="fa-solid fa-magnifying-glass"></i>
                                <input type="text" id="hSearch" placeholder="Search by Case ID or Arbitrator" oninput="applyFilters()">
                            </div>
                            <select id="statusFilter" class="custom-select" onchange="applyFilters()">
                                <option value="All">All Status</option>
                                <option value="Scheduled">Scheduled</option>
                                <option value="Live">Live</option>
                                <option value="Completed">Completed</option>
                            </select>
                            <input type="date" id="dateFilter" class="custom-select" onchange="applyFilters()">
                            <select id="typeFilter" class="custom-select" onchange="applyFilters()">
                                <option value="All">All Types</option>
                                <option value="Virtual">Virtual</option>
                                <option value="In-Person">In-Person</option>
                            </select>
                            <button class="btn-primary-sm" onclick="scheduleNew()"><i class="fa-solid fa-plus"></i> Schedule</button>
                        </div>
                    </div>

                    <div class="table-container">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Hearing ID</th>
                                    <th>Case ID</th>
                                    <th>Arbitrator</th>
                                    <th>Date/Time</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="hearings-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <div class="side-col">
                    <h3 style="font-size: 1rem; margin-bottom: 15px; color: #1e293b; font-weight: 700;">Recent Activities</h3>
                    <div class="log-container" id="activity-log">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script src="admin_mock_data.js"></script>
    <script src="admin_sidebar.js"></script>
    <script src="admin_navbar.js"></script>
    <script>
        let filteredData = [];

        function init() {
            updateStats();
            renderActivityLog();
            applyFilters();
        }

        function updateStats() {
            const list = AdminData.hearings || [];
            document.getElementById('stat-total').innerText = list.length;
            document.getElementById('stat-upcoming').innerText = list.filter(h => h.status === 'Scheduled').length;
            document.getElementById('stat-completed').innerText = list.filter(h => h.status === 'Completed').length;
            
            const todayStr = new Date().toISOString().split('T')[0];
            document.getElementById('stat-today').innerText = list.filter(h => h.date === todayStr).length;
        }

        function renderActivityLog() {
            const logContainer = document.getElementById('activity-log');
            const logs = AdminData.logs || [];

            if (logs.length === 0) {
                logContainer.innerHTML = `<p style="font-size: 0.85rem; color: #94a3b8; text-align: center;">No recent modifications.</p>`;
                return;
            }

            logContainer.innerHTML = logs.map(log => `
                <div class="log-item">
                    <span class="log-text">${log.event}</span>
                    <span class="log-date">${log.date}</span>
                </div>
            `).join('');
        }

        function applyFilters() {
            const query = document.getElementById('hSearch').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const type = document.getElementById('typeFilter').value;
            const date = document.getElementById('dateFilter').value;

            filteredData = (AdminData.hearings || []).filter(h => {
                const matchesSearch = h.caseId.toLowerCase().includes(query) || h.arbitrator.toLowerCase().includes(query);
                const matchesStatus = status === 'All' || h.status === status;
                const matchesType = type === 'All' || h.type === type;
                const matchesDate = !date || h.date === date;
                return matchesSearch && matchesStatus && matchesType && matchesDate;
            });
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('hearings-table-body');
            tbody.innerHTML = filteredData.map(h => `
                <tr>
                    <td style="font-weight: 700; color: #64748b;">${h.id}</td>
                    <td style="color: #2563eb; font-weight: 600;">${h.caseId}</td>
                    <td>${h.arbitrator}</td>
                    <td>${h.date}, ${h.time}</td>
                    <td><span style="font-size: 0.75rem; font-weight: 600; color: ${h.type === 'Virtual' ? '#7c3aed' : '#db2777'}">${h.type}</span></td>
                    <td><span class="status-pill status-${h.status.toLowerCase()}">${h.status}</span></td>
                    <td>
                        <div class="actions-flex">
                            <button class="btn-mini" title="View" onclick="viewHearing('${h.id}')"><i class="fa-solid fa-eye"></i></button>
                            <button class="btn-mini" title="Edit" onclick="viewHearing('${h.id}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-mini btn-delete" title="Delete" onclick="deleteHearing('${h.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function viewHearing(id) {
            window.location.href = `admin_hearing_details.html?id=${encodeURIComponent(id)}`;
        }

        function scheduleNew() {
            const newId = "H-2024-" + Math.floor(1000 + Math.random() * 8999);
            const candidateCase = (AdminData.cases || []).find(c => c.status !== 'Closed') || {};
            const caseId = candidateCase.id || ("CS-2024-" + Math.floor(100 + Math.random() * 899));
            const arbitratorName = candidateCase.arbitrator && candidateCase.arbitrator.name
                ? candidateCase.arbitrator.name
                : ((AdminData.arbitrators || []).find(a => a.status === 'Active') || {}).name || "Unassigned";
            const newH = {
                id: newId,
                caseId: caseId,
                arbitrator: arbitratorName,
                date: new Date().toISOString().split('T')[0],
                time: "10:00 AM",
                type: "Virtual",
                status: "Scheduled"
            };
            AdminData.hearings.unshift(newH);
            
            // Record activity and save
            logAdminActivity(`Scheduled new hearing ${newId}`);
            
            init(); // Refresh UI
        }

        function deleteHearing(id) {
            if(confirm(`Permanently delete hearing ${id}?`)) {
                AdminData.hearings = AdminData.hearings.filter(h => h.id !== id);
                
                // Record activity and save
                logAdminActivity(`Deleted hearing ${id}`);
                
                init(); // Refresh UI
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
