<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ServiceHub – Raise New Dispute</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <header class="navbar">
    <div class="navbar__brand" style="cursor: pointer;" onclick="window.location.href='../Landing_Page/index.html'">
      <div class="navbar__logo"><i class="fa-solid fa-wrench"></i></div>
      <span class="navbar__name">ServiceHub</span>
    </div>
    <div class="navbar__search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Search jobs, customers, or services…" />
    </div>
    <div class="navbar__actions">
      <button class="navbar__notif" aria-label="Notifications">
        <i class="fa-regular fa-bell"></i>
        <span class="badge" style="display: flex;">3</span>
      </button>
      <img src="https://ui-avatars.com/api/?name=Provider&background=2F54EB&color=fff&size=80" alt="Provider Avatar" class="navbar__avatar" />
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav class="sidebar__nav">
        <a href="provider_dashboard.html"    class="sidebar__link"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
        <a href="profile.html"  class="sidebar__link"><i class="fa-regular fa-user"></i><span>Profile</span></a>
        <a href="services.html" class="sidebar__link"><i class="fa-solid fa-wrench"></i><span>Services</span></a>
        <a href="jobs.html"     class="sidebar__link"><i class="fa-solid fa-briefcase"></i><span>Active Jobs</span></a>
        <a href="earnings.html" class="sidebar__link"><i class="fa-solid fa-dollar-sign"></i><span>Earnings</span></a>
        <a href="disputes.html" class="sidebar__link active"><i class="fa-solid fa-triangle-exclamation"></i><span>Disputes</span></a>
      </nav>
      <a href="../Landing_Page/index.html" class="sidebar__logout" id="logoutBtn" onclick="event.preventDefault(); logoutProvider();">
        <i class="fa-solid fa-arrow-right-from-bracket"></i><span>Logout</span>
      </a>
    </aside>

    <main class="main">
      
      <div class="page-header" style="margin-bottom: 24px;">
        <h1>Raise New Dispute</h1>
        <p>Submit a dispute for arbitration if there is an issue with a customer or job.</p>
      </div>

      <div class="form-card">
        <div class="form-container-single">

          <div class="form-group">
            <label>Job ID</label>
            <input type="text" id="disputeJobId" placeholder="Enter job ID (e.g., JOB-12345)" />
          </div>

          <div class="form-group">
            <label>Customer Name</label>
            <input type="text" id="disputeCustomer" placeholder="Enter customer's full name" />
          </div>

          <div class="form-group">
            <label>Issue Category</label>
            <select id="disputeCategory">
              <option value="" disabled selected>Select an issue category</option>
              <option>Payment Dispute</option>
              <option>Customer Unresponsive</option>
              <option>Scope of Work Creep</option>
              <option>Unfair Cancellation</option>
              <option>Other</option>
            </select>
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="disputeDescription" placeholder="Describe the issue in detail..." style="min-height: 140px;"></textarea>
          </div>

          <div class="form-group">
            <label>Upload Evidence</label>
            <div class="file-upload-zone" id="evidenceDropZone">
              <div class="file-upload-icon">
                <i class="fa-solid fa-cloud-arrow-up"></i>
              </div>
              <div class="file-upload-text">
                <strong id="evidenceUploadText">Click to upload or drag and drop</strong>
                <span id="evidenceUploadHint">PNG, JPG, PDF up to 10MB</span>
              </div>
              <input type="file" id="evidenceFileInput" accept=".png, .jpg, .jpeg, .pdf" multiple style="display: none;" />
            </div>
          </div>

        </div>

        <div class="form-actions" style="margin-top: 16px;">
          <button class="btn btn--primary" id="submitDisputeBtn">Submit Dispute</button>
          <button class="btn btn--outline" onclick="window.location.href='disputes.html'">Cancel</button>
        </div>

      </div>

    </main>
  </div>

  <script src="assets/js/mockData.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="assets/js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { protectPage('provider'); });
  </script>
</body>
</html>
