<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitrator Application | Stage 2</title>
    <link rel="stylesheet" href="arbitrator_styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="arbitrator_landing.html" class="logo">ServiceHub</a>
            <button class="btn btn-blue" style="font-size: 0.9rem; padding: 8px 20px;">Contact : ABC@gmail.com</button>
        </div>
    </nav>

    <div class="container">
        <h1 class="form-title">Arbitrator Application Form</h1>
        <p class="form-subtitle">Complete the steps below to apply as a verified arbitrator.</p>

        <div class="stepper">
            <div class="step-item">
                <div class="step-circle active"></div>
                <div class="step-label">Personal<br>Information</div>
                <div class="step-line" style="background: #228B22;"></div> 
            </div>
            <div class="step-item">
                <div class="step-circle active"></div>
                <div class="step-label">Professional<br>Background</div>
                <div class="step-line"></div>
            </div>
            <div class="step-item">
                <div class="step-circle"></div>
                <div class="step-label">Documents</div>
                <div class="step-line"></div>
            </div>
            <div class="step-item">
                <div class="step-circle"></div>
                <div class="step-label">Review</div>
                <div class="step-line"></div>
            </div>
        </div>

        <div class="hero">
            <div class="form-section">
                <form id="appFormStage2">
                    <div class="input-group">
                        <label for="experience">Years of Experience*</label>
                        <input type="number" id="experience" class="input-field" placeholder="0" required>
                    </div>
                    <div class="input-group">
                        <label for="expertise">Area of Expertise*</label>
                        <input type="text" id="expertise" class="input-field" required>
                    </div>
                    <div class="input-group">
                        <label for="organization">Professional Organization*</label>
                        <input type="text" id="organization" class="input-field" required>
                    </div>
                    <div class="input-group">
                        <label for="prevExperience">Previous Arbitration Experience</label>
                        <textarea id="prevExperience" class="input-field" style="height: 150px; resize: none;"></textarea>
                    </div>
                    
                    <div style="display: flex; justify-content: flex-end; gap: 20px; margin-top: 30px;">
                        <button type="button" onclick="handleBack()" class="btn btn-blue">← Back</button>
                        <button type="button" onclick="handleNextStep2()" class="btn btn-blue">Next →</button>
                    </div>
                </form>
            </div>
            
            <div class="side-content">
                <div style="border: 2px solid #000; border-radius: 20px; overflow: hidden; height: auto;">
                    <img src="form1_pic1.png" alt="Arbitrator Illustration" style="width: 100%; height: auto; display: block;">
                </div>
            </div>
        </div>

        <footer class="footer">
            © 2026 Service Quality, Rating & Dispute Management System
        </footer>
    </div>

    <script src="mock_data.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="arbitrator_app.js"></script>
    <script>
        // Auto-load data from localStorage on page load
        document.addEventListener('DOMContentLoaded', () => {
            if (!ensureApplicationStep(2)) return;
            document.getElementById('appFormStage2').addEventListener('submit', (event) => {
                event.preventDefault();
                handleNextStep2();
            });
            if (typeof ArbitratorData !== 'undefined') {
                const data = ArbitratorData.registration.formData;
                if (data.experience) document.getElementById('experience').value = data.experience;
                if (data.expertise) document.getElementById('expertise').value = data.expertise;
                if (data.organization) document.getElementById('organization').value = data.organization;
                if (data.prevExperience) document.getElementById('prevExperience').value = data.prevExperience;
            }
        });

        function showError(inputId, message) {
            const input = document.getElementById(inputId);
            alert(message); 
            if (input) {
                input.style.borderColor = '#EF4444';
                setTimeout(() => input.style.borderColor = '', 3000);
            }
        }

        function handleNextStep2() {
            // Client-side Validation
            const exp = document.getElementById('experience').value;
            const expertise = document.getElementById('expertise').value.trim();
            const org = document.getElementById('organization').value.trim();
            const prevExperience = document.getElementById('prevExperience').value.trim();

            if (!exp || isNaN(exp) || Number(exp) < 0 || Number(exp) > 70) {
                return showError('experience', 'Please enter a valid number of years of experience.');
            }
            if (!expertise || expertise.length < 3) {
                return showError('expertise', 'Area of Expertise must be at least 3 characters.');
            }
            if (!org || org.length < 2) {
                return showError('organization', 'Professional Organization is required.');
            }

            // Save Progress to LocalStorage safely constraints
            try {
                updateRegistrationStep(2, {
                    experience: Number(exp),
                    expertise: expertise,
                    organization: org,
                    prevExperience: prevExperience
                });

                // Redirect to Stage 3
                window.location.href = 'arbitrator_form_3.html';
            } catch(e) {
                console.error("Local storage error:", e);
                alert("Failed to save progress. Please check storage permissions.");
            }
        }

        function handleBack() {
            window.location.href = 'arbitrator_form_1.html';
        }
    </script>
</body>
</html>
