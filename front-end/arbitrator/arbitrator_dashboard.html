<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arbitrator Dashboard | ServiceHub</title>
    <link rel="stylesheet" href="arbitrator_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="arb-dashboard-wrapper">
        <div id="arbitrator-sidebar-placeholder"></div>

        <main class="arb-main">
            <div id="arbitrator-navbar-placeholder"></div>

            <div class="arb-content">
                <div style="margin-bottom: 28px;">
                    <h1 style="font-size: 1.75rem; font-weight: 800; color: #111827;">Welcome back, <span id="welcome-name" style="color: #1E3A8A;"></span></h1>
                    <p style="color: #6B7280; margin-top: 6px; font-size: 0.95rem;">Here's an overview of your active arbitration caseload.</p>
                </div>

                <div class="arb-stats-grid" id="stats-container"></div>

                <div class="arb-main-grid" style="margin-top: 30px;">
                    <div class="arb-panel">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <h3 style="font-size: 1.1rem; font-weight: 700; color: #111827;">Recent Case Assignments</h3>
                            <a href="arbitrator_assigned_cases.html" style="color: #1E3A8A; font-size: 0.85rem; font-weight: 600; text-decoration: none;">View All →</a>
                        </div>
                        <table class="arb-table" id="cases-table">
                            <thead>
                                <tr>
                                    <th>Case ID</th>
                                    <th>Type</th>
                                    <th>Parties</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Next</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <div class="arb-panel">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <h3 style="font-size: 1.1rem; font-weight: 700; color: #111827;">Upcoming Hearings</h3>
                            <a href="arbitrator_hearings.html" style="color: #1E3A8A; font-size: 0.85rem; font-weight: 600; text-decoration: none;">View All →</a>
                        </div>
                        <div id="hearings-list"></div>
                    </div>
                </div>

                <div class="arb-panel" style="margin-top: 30px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="font-size: 1.1rem; font-weight: 700; color: #111827;">Pending Decisions</h3>
                        <a href="arbitrator_decisions.html" style="color: #1E3A8A; font-size: 0.85rem; font-weight: 600; text-decoration: none;">View All →</a>
                    </div>
                    <table class="arb-table">
                        <thead>
                            <tr>
                                <th>Case ID</th>
                                <th>Parties</th>
                                <th>Type</th>
                                <th>Deadline</th>
                                <th>Status</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="decisions-table"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="mock_data.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="arbitrator_app.js"></script>
    <script>
        guardArbitratorPage();
    </script>
    <script src="arbitrator_sidebar.js"></script>
    <script src="arbitrator_navbar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!guardArbitratorPage() || typeof ArbitratorData === 'undefined') return;
            const data = ArbitratorData;

            // Welcome name
            const welcomeEl = document.getElementById('welcome-name');
            if (welcomeEl) {
                welcomeEl.innerText = data.profile.name.split(' ')[0];
            }

            // Stats Cards
            const stats = data.stats;
            const statsContainer = document.getElementById('stats-container');
            if (statsContainer) {
                statsContainer.innerHTML = `
                    <div class="arb-stat-card">
                        <div>
                            <h3>${stats.assignedCases}</h3>
                            <p>Active Cases</p>
                        </div>
                        <i class="fa-solid fa-folder-open" style="color: #1E3A8A; font-size: 1.4rem;"></i>
                    </div>
                    <div class="arb-stat-card">
                        <div>
                            <h3>${stats.upcomingHearings}</h3>
                            <p>Hearings</p>
                        </div>
                        <i class="fa-solid fa-calendar-check" style="color: #1E3A8A; font-size: 1.4rem;"></i>
                    </div>
                    <div class="arb-stat-card">
                        <div>
                            <h3>${stats.pendingDecisions}</h3>
                            <p>Decisions</p>
                        </div>
                        <i class="fa-solid fa-gavel" style="color: #F59E0B; font-size: 1.4rem;"></i>
                    </div>
                    <div class="arb-stat-card">
                        <div>
                            <h3>${stats.docsToReview}</h3>
                            <p>Documents</p>
                        </div>
                        <i class="fa-solid fa-file-alt" style="color: #10B981; font-size: 1.4rem;"></i>
                    </div>
                    <div class="arb-stat-card">
                        <div>
                            <h3>${stats.messages}</h3>
                            <p>Messages</p>
                        </div>
                        <i class="fa-solid fa-envelope-open-text" style="color: #8B5CF6; font-size: 1.4rem;"></i>
                    </div>
                `;
            }

            // Recent Cases Table
            const tbody = document.querySelector('#cases-table tbody');
            if (tbody) {
                tbody.innerHTML = data.recentCases.map(c => `
                    <tr style="border-bottom: 1px solid #F3F4F6;">
                        <td style="font-weight: 700; color: #1E3A8A;">${c.id}</td>
                        <td style="font-size: 0.85rem; color: #4B5563;">${c.type}</td>
                        <td style="font-size: 0.85rem; color: #374151;">${c.parties}</td>
                        <td style="color: #6B7280; font-size: 0.85rem;">${c.date}</td>
                        <td><span class="arb-badge ${c.statusClass}">${c.status}</span></td>
                        <td style="color: #6B7280; font-size: 0.85rem;">${c.next}</td>
                        <td><a href="${buildCaseDetailsUrl(c.id)}" style="color: #1E3A8A; font-weight: 600; text-decoration: none; font-size: 0.85rem;">View →</a></td>
                    </tr>
                `).join('');
            }

            // Upcoming Hearings List
            const hearingsList = document.getElementById('hearings-list');
            if (hearingsList) {
                const displayHearings = data.upcomingHearings.slice(0, 4);
                hearingsList.innerHTML = displayHearings.map(h => `
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #F3F4F6;">
                        <div style="display: flex; align-items: center; gap: 14px;">
                            <div style="width: 42px; height: 42px; background: #DBEAFE; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                                <i class="fa-solid fa-calendar" style="color: #1E40AF; font-size: 1rem;"></i>
                            </div>
                            <div>
                                <p style="font-weight: 700; font-size: 0.9rem; color: #111827; margin-bottom: 2px;">${h.id}</p>
                                <p style="font-size: 0.8rem; color: #6B7280;">${h.parties.split(' vs ')[0]}</p>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <p style="font-weight: 600; font-size: 0.85rem; color: #1E3A8A;">${h.time}</p>
                            <p style="font-size: 0.75rem; color: #9CA3AF;">${h.type}</p>
                        </div>
                    </div>
                `).join('');
            }

            // Pending Decisions
            const decisionsTable = document.getElementById('decisions-table');
            if (decisionsTable) {
                const pendingDecisions = data.decisionsList.filter(d => d.status === 'Awaiting Decision').slice(0, 4);
                decisionsTable.innerHTML = pendingDecisions.map(d => `
                    <tr style="border-bottom: 1px solid #F3F4F6;">
                        <td style="font-weight: 700; color: #1E3A8A;">${d.id}</td>
                        <td style="font-size: 0.85rem; color: #374151;">${d.parties.split(' vs ')[0]}</td>
                        <td style="font-size: 0.85rem; color: #6B7280;">${d.type}</td>
                        <td style="font-size: 0.85rem; font-weight: 600; color: #92400E;">${d.deadline}</td>
                        <td><span class="arb-badge ${d.statusClass}">${d.status}</span></td>
                        <td><a href="${buildDecisionsUrl(d.id)}" style="color: #1E3A8A; font-weight: 600; text-decoration: none; font-size: 0.85rem;">Issue Award →</a></td>
                    </tr>
                `).join('');
            }
        });
    </script>
</body>
</html>
