<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ServiceHub – Profile Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .profile-layout { max-width: 800px; margin: 0 auto; }
    
    .profile-header-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; display: flex; align-items: center; gap: 24px; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
    .profile-avatar-large { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary-light); }
    .profile-header-info h2 { font-size: 1.5rem; font-weight: 800; color: var(--text-dark); margin-bottom: 4px; }
    .profile-header-info p { color: var(--text-mid); font-size: 0.95rem; }
    
    .settings-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
    .settings-card h3 { font-size: 1.2rem; font-weight: 700; color: var(--text-dark); margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    
    .input-wrapper { display: flex; flex-direction: column; gap: 8px; }
    .input-wrapper label { font-size: 0.85rem; font-weight: 600; color: var(--text-dark); }
    .input-field { padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font); font-size: 0.95rem; width: 100%; outline: none; transition: 0.2s; color: var(--text-dark); }
    .input-field:disabled { background-color: #F9FAFB; color: var(--text-mid); cursor: not-allowed; }
    .input-field:focus:not(:disabled) { border-color: var(--primary); }
    
    .btn-row { display: flex; gap: 12px; justify-content: flex-end; }
    
    .alert-msg { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 600; margin-bottom: 20px; display: none; }
    .alert--success { background: var(--green-bg); color: var(--green); border: 1px solid #A7F3D0; }
    .alert--error { background: #FEE2E2; color: var(--red); border: 1px solid #FECACA; }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="navbar__brand">
      <div class="navbar__logo"><i class="fa-solid fa-wrench"></i></div>
      <span class="navbar__name">ServiceHub</span>
    </div>
    <div class="navbar__actions">
      <button class="navbar__notif"><i class="fa-regular fa-bell"></i></button>
      <img src="" alt="User" class="navbar__avatar user-display-avatar" />
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav class="sidebar__nav">
        <a href="customer_dashboard.html" class="sidebar__link"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
        <a href="browse-services.html"    class="sidebar__link"><i class="fa-solid fa-magnifying-glass"></i><span>Browse Services</span></a>
        <a href="my-bookings.html"        class="sidebar__link"><i class="fa-regular fa-calendar-check"></i><span>My Bookings</span></a>
        <a href="disputes.html"           class="sidebar__link"><i class="fa-solid fa-triangle-exclamation"></i><span>Disputes</span></a>
        <a href="profile.html"            class="sidebar__link active"><i class="fa-regular fa-user"></i><span>Profile</span></a>
      </nav>
      <a href="../Landing_Page/index.html" class="sidebar__logout"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Logout</span></a>
    </aside>

    <main class="main">
      <div class="page-header" style="margin-bottom: 24px; text-align: center;">
        <h1>Account Settings</h1>
      </div>

      <div class="profile-layout">
        
        <div class="profile-header-card">
          <img src="" alt="Profile" class="profile-avatar-large user-display-avatar" />
          <div class="profile-header-info">
            <h2 class="user-display-name">Loading...</h2>
            <p id="member-since">Member since...</p>
          </div>
        </div>

        <div class="settings-card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px;">
            <h3 style="margin: 0; border: none; padding: 0;">Personal Information</h3>
            <button id="edit-profile-btn" class="btn btn--outline btn--sm"><i class="fa-solid fa-pen" style="margin-right: 6px;"></i> Edit Profile</button>
          </div>

          <div id="profile-success-msg" class="alert-msg alert--success"><i class="fa-solid fa-circle-check"></i> Profile updated successfully!</div>
          <div id="profile-error-msg" class="alert-msg alert--error"></div>

          <div id="profile-form">
            <div class="form-grid">
              <div class="input-wrapper">
                <label>Full Name</label>
                <input type="text" id="profile-name" class="input-field" disabled />
              </div>
              <div class="input-wrapper">
                <label>Email Address</label>
                <input type="email" id="profile-email" class="input-field" disabled />
              </div>
              <div class="input-wrapper">
                <label>Phone Number</label>
                <input type="tel" id="profile-phone" class="input-field" disabled />
              </div>
              <div class="input-wrapper">
                <label>Location</label>
                <input type="text" id="profile-location" class="input-field" disabled />
              </div>
            </div>

            <div class="btn-row">
              <button id="cancel-edit-btn" class="btn btn--outline" style="display: none;">Cancel</button>
              <button id="save-profile-btn" class="btn btn--primary" style="display: none;">Save Changes</button>
            </div>
          </div>
        </div>

        <div class="settings-card">
          <h3>Security & Password</h3>
          
          <div id="password-success-msg" class="alert-msg alert--success"><i class="fa-solid fa-circle-check"></i> Password changed successfully!</div>
          <div id="password-error-msg" class="alert-msg alert--error"><i class="fa-solid fa-circle-exclamation"></i> Error message here.</div>

          <form id="password-form">
            <div class="input-wrapper" style="margin-bottom: 20px;">
              <label>Current Password</label>
              <input type="password" id="current-password" class="input-field" placeholder="Enter current password" />
            </div>
            
            <div class="form-grid">
              <div class="input-wrapper">
                <label>New Password</label>
                <input type="password" id="new-password" class="input-field" placeholder="Create new password" />
              </div>
              <div class="input-wrapper">
                <label>Confirm New Password</label>
                <input type="password" id="confirm-password" class="input-field" placeholder="Confirm new password" />
              </div>
            </div>

            <div class="btn-row" style="margin-top: 24px;">
              <button type="submit" class="btn btn--primary">Update Password</button>
            </div>
          </form>
        </div>

      </div>
    </main>
  </div>

  <script src="assets/js/mockData.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/profile.js"></script>
</body>
</html>
