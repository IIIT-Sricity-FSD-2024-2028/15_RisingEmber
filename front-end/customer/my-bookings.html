<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ServiceHub – My Bookings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    /* Tabs */
    .booking-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .tab-pill {
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-mid);
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-pill:hover { border-color: var(--primary); color: var(--primary); }
    .tab-pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Bookings Grid */
    .bookings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 900px) {
      .bookings-grid { grid-template-columns: 1fr; }
    }

    /* Booking Card */
    .booking-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .booking-card__header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .booking-provider {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .provider-icon {
      width: 48px; height: 48px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .provider-icon--blue { background: var(--blue-bg); color: var(--primary); }
    .provider-icon--orange { background: var(--orange-bg); color: var(--orange); }
    .provider-icon--purple { background: var(--purple-bg); color: var(--purple); }
    .provider-icon--red { background: #FEE2E2; color: var(--red); }
    .provider-icon--green { background: var(--green-bg); color: var(--green); }

    .provider-info h3 { font-size: 1rem; color: var(--text-dark); margin-bottom: 2px; }
    .provider-info span { font-size: 0.8rem; color: var(--text-soft); }

    .booking-status { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .status--confirmed { color: var(--green); }
    .status--completed { color: var(--primary); }
    .status--cancelled { color: var(--red); }

    .booking-details {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-mid);
    }
    .booking-details p { display: flex; align-items: center; gap: 10px; margin: 0; }
    .booking-details i { color: var(--text-soft); width: 16px; text-align: center; }

    .booking-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .btn-report { border: 1px solid #FCA5A5; color: var(--red); background: transparent; flex: 1; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.2s;}
    .btn-report:hover { background: #FEF2F2; border-color: var(--red); }
    .btn-view { flex: 1; padding: 10px; }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="navbar__brand">
      <div class="navbar__logo"><i class="fa-solid fa-wrench"></i></div>
      <span class="navbar__name">ServiceHub</span>
    </div>
    <div class="navbar__actions">
      <button class="navbar__notif"><i class="fa-regular fa-bell"></i></button>
      <img src="https://ui-avatars.com/api/?name=Ashwin&background=2F54EB&color=fff" alt="User" class="navbar__avatar" />
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav class="sidebar__nav">
        <a href="customer_dashboard.html" class="sidebar__link"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
        <a href="browse-services.html"    class="sidebar__link"><i class="fa-solid fa-magnifying-glass"></i><span>Browse Services</span></a>
        <a href="my-bookings.html"        class="sidebar__link active"><i class="fa-regular fa-calendar-check"></i><span>My Bookings</span></a>
        <a href="disputes.html"           class="sidebar__link"><i class="fa-solid fa-triangle-exclamation"></i><span>Disputes</span></a>
        <a href="profile.html"            class="sidebar__link"><i class="fa-regular fa-user"></i><span>Profile</span></a>
      </nav>
      <a href="../Landing_Page/index.html" class="sidebar__logout"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Logout</span></a>
    </aside>

    <main class="main">
      <div class="page-header" style="margin-bottom: 24px;">
        <h1>My Bookings</h1>
      </div>

      <div class="booking-tabs" id="booking-tabs">
        <button class="tab-pill active" data-filter="all">All Bookings</button>
        <button class="tab-pill" data-filter="upcoming">Upcoming</button>
        <button class="tab-pill" data-filter="completed">Completed</button>
        <button class="tab-pill" data-filter="cancelled">Cancelled</button>
      </div>

      <div class="bookings-grid" id="bookings-grid">
        </div>
    </main>
  </div>
  
  <script src="assets/js/mockData.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/my-bookings.js"></script> 
</body>
</html>
