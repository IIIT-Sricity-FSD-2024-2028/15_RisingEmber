<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ServiceHub – Customer Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">
      
      <div class="auth-form-side">
        <a href="../Landing_Page/index.html" class="auth-brand">
          <div class="auth-logo-icon"><i class="fa-solid fa-wrench"></i></div>
          <span class="auth-logo-text">ServiceHub</span>
        </a>

        <div class="auth-header">
          <h1>Login to your account</h1>
          <p>Welcome back! Let's get your home sorted.</p>
        </div>

        <form id="customerLoginForm" class="auth-form">
          <div id="loginMessage" class="form-feedback"></div>
          <div class="form-group">
            <label>Email or Phone</label>
            <input type="text" id="loginIdentifier" placeholder="Enter your email or phone" required />
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="loginPassword" placeholder="Enter your password" required />
              <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)"><i class="fa-regular fa-eye-slash"></i></button>
            </div>
          </div>

          <div class="auth-options">
            <div class="auth-checkbox">
              <label>
                <input type="checkbox" id="rememberMe" />
                <span>Remember me</span>
              </label>
            </div>
            <a href="../Landing_Page/contact.html" class="forgot-password">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn--primary btn--full auth-submit">Login</button>
        </form>

        <div class="auth-footer">
          <p>Don't have an account? <a href="signup.html">Create one</a></p>
        </div>
      </div>

      <div class="auth-image-side">
        <div class="auth-image-wrapper" style="background: #fff; padding: 24px; border-radius: 16px;">
          <img src="https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&q=80&w=600" alt="Clean Home" style="border-radius: 8px;" />
        </div>
      </div>

    </div>
  </div>
  <script src="assets/js/mockData.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
